# The no-cloud dev stack: lcatd against MinIO (S3) and DynamoDB-local, wired
# through LCATD_AWS_ENDPOINT. This is the same code path production takes
# against real S3 and DynamoDB -- the endpoint is the only difference -- so it
# exercises the S3 grain store and the conditional-put document store rather
# than the in-memory fakes a `go test` run uses.
#
#   docker compose up --build
#   open http://localhost:8080/admin/    (eve@example.org / changeme123)
#
# For the simpler loop -- a directory grain store, no containers at all -- see
# docs/local-dev.md.

name: libcat

services:
  lcatd:
    build:
      context: .
      args:
        VERSION: dev
    ports:
      - "8080:8080"
    environment:
      LCATD_LOCAL_AUTH: "1"
      LCATD_BOOTSTRAP_ADMIN: "eve@example.org:changeme123"
      # Dev-only: a real deployment takes this from a secret, never a literal.
      LCATD_ABUSE_SECRET: "compose-0123456789abcdef01234567"
      LCATD_S3_BUCKET: "libcat"
      LCATD_DYNAMO_TABLE: "libcat-sidecar"
      # Two unrelated servers, so two endpoints. LCATD_AWS_ENDPOINT would set
      # both at once, which only suits a single compatible endpoint (LocalStack).
      LCATD_S3_ENDPOINT: "http://minio:9000"
      LCATD_DYNAMO_ENDPOINT: "http://dynamodb:8000"
      LCATD_SHUTDOWN_DELAY: "2s"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      dynamo-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"   # console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Creates the grain bucket. Runs once and exits; lcatd waits for it.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/libcat
        echo "bucket ready"

  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"

  # Creates the pk/sk document table (see backend/deploy/terraform/dynamodb.tf).
  # No GSIs by design: services maintain their own index items.
  dynamo-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
    entrypoint:
      - sh
      - -c
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 >/dev/null 2>&1; do
          echo "waiting for dynamodb-local"; sleep 1
        done
        aws dynamodb create-table --endpoint-url http://dynamodb:8000 \
          --table-name libcat-sidecar \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          2>/dev/null || echo "table exists"
        echo "table ready"

volumes:
  minio-data:
